services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      - backend

  backend:
    image: nginx:1.25-alpine
    ports:
      - "3001:3001"
    volumes:
      - ./mocks:/usr/share/nginx/html
    command: >
      sh -c "echo 'server { listen 3001; default_type application/json; root /usr/share/nginx/html; }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
